# ~/.config/sway/conf.d/keybinds.conf

# ==================================================
# APLICACIONES
# ==================================================
bindsym $mod+Return exec foot
bindsym $mod+e exec thunar
bindsym $mod+w exec sh -c 'gtk-launch "$(xdg-settings get default-web-browser)"'

bindsym $mod+Shift+e exec foot -e yazi
bindsym $mod+Shift+v exec foot -e nvim
bindsym $mod+Shift+m exec foot -e rmpc

bindsym Ctrl+Mod4+r exec /home/ezequiel/.config/sway/scripts/restart_noctalia.sh
bindsym $mod+Escape exec qs -c noctalia-shell ipc call systemMonitor toggle
# ==================================================
# LAUNCHERS / MENÚS (NOCTALIA)
# ==================================================

bindsym $mod+space exec qs -c noctalia-shell ipc call launcher toggle
bindsym $mod+s exec qs -c noctalia-shell ipc call controlCenter toggle
bindsym $mod+n exec qs -c noctalia-shell ipc call controlCenter toggle
bindsym $mod+Mod1+v exec qs -c noctalia-shell ipc call settings toggle
bindsym Control+Mod1+Delete exec qs -c noctalia-shell ipc call sessionMenu toggle
bindsym Mod4+Shift+t exec qs -c noctalia-shell ipc call wallpaper toggle
bindsym Mod4+Shift+b exec qs -c noctalia-shell ipc call bar toggle
bindsym $mod+comma exec qs -c noctalia-shell ipc call settings toggle


# --- Control de Volumen (Noctalia Shell) ---

bindsym --locked XF86AudioRaiseVolume exec qs -c noctalia-shell ipc call volume increase
bindsym --locked XF86AudioLowerVolume exec qs -c noctalia-shell ipc call volume decrease
bindsym --locked XF86AudioMute       exec qs -c noctalia-shell ipc call volume muteOutput

# --- Control Multimedia (Noctalia Shell) ---
bindsym --locked XF86AudioPlay exec qs -c noctalia-shell ipc call media playPause
bindsym --locked XF86AudioNext exec qs -c noctalia-shell ipc call media next
bindsym --locked XF86AudioPrev exec qs -c noctalia-shell ipc call media previous
bindsym --locked XF86AudioStop exec qs -c noctalia-shell ipc call media pause



# ==================================================
# GESTIÓN DE VENTANAS
# ==================================================
bindsym $mod+q kill
floating_modifier $mod normal

bindsym $mod+d layout toggle tabbed split
bindsym $mod+f fullscreen toggle

bindsym $mod+Shift+space floating toggle
bindsym $mod+Mod1+space floating toggle

bindsym $mod+Tab focus mode_toggle
bindsym $mod+a focus parent


# ==================================================
# NAVEGACIÓN ENTRE VENTANAS
# ==================================================

bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right


# ==================================================
# MOVER VENTANAS
# ==================================================
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right


# ==================================================
# ALT + TAB
# ==================================================
bindsym Mod1+Tab focus next
bindsym Mod1+Shift+Tab focus prev


# ==================================================
# WORKSPACES
# ==================================================
bindsym $mod+Control+Left workspace prev
bindsym $mod+Control+Right workspace next


# ==================================================
# LAYOUTS
# ==================================================
bindsym $mod+b splith
bindsym $mod+v splitv
bindsym $mod+t layout tabbed
bindsym $mod+x layout toggle split


# ==================================================
# SCRATCHPAD
# ==================================================
bindsym $mod+Shift+minus move scratchpad
bindsym $mod+minus scratchpad show


# ==================================================
# RESIZE MODE
# ==================================================
mode "resize" {
    bindsym $left resize shrink width 10px
    bindsym $right resize grow width 10px
    bindsym $up resize shrink height 10px
    bindsym $down resize grow height 10px

    bindsym Left resize shrink width 10px
    bindsym Right resize grow width 10px
    bindsym Up resize shrink height 10px
    bindsym Down resize grow height 10px

    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"


# ==================================================
# SISTEMA
# ==================================================
bindsym $mod+Shift+r reload
bindsym $mod+Shift+s exec ~/.config/sway/scripts/screenshot-area.sh
